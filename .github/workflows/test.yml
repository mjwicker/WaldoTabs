name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  test-e2e:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Firefox
        run: |
          sudo apt-get update -q
          sudo apt-get install -y firefox
      - name: Install Geckodriver
        run: |
          GD_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -fsSL "https://github.com/mozilla/geckodriver/releases/download/v${GD_VERSION}/geckodriver-v${GD_VERSION}-linux64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
      - run: npm ci
      - name: Run E2E tests (xvfb)
        run: xvfb-run npm run test:e2e
