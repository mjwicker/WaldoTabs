<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waldo Tabs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid #2e2e4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 14px; font-weight: 600; color: #7c3aed; }
    .provider-badge {
      font-size: 10px;
      color: #888;
      background: #2e2e4a;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .provider-badge.connected { color: #6ee7b7; background: #064e3b; }

    .action-row {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      border-bottom: 1px solid #2e2e4a;
    }
    .btn {
      flex: 1;
      padding: 7px 8px;
      background: #2e2e4a;
      border: 1px solid #3e3e5e;
      color: #e0e0e0;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .btn:hover { background: #3e3e5e; }
    .btn.primary {
      background: #4f46e5;
      border-color: #818cf8;
      color: #fff;
    }
    .btn.primary:hover { background: #6366f1; }
    .btn.chat {
      background: #5b21b6;
      border-color: #7c3aed;
      color: #fff;
    }
    .btn.chat:hover { background: #6d28d9; }

    .tab-controls {
      padding: 6px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid #2e2e4a;
    }
    .filter-bar { display: flex; gap: 4px; }
    .filter-btn {
      padding: 3px 8px;
      font-size: 10px;
      background: #2e2e4a;
      border: 1px solid #3e3e5e;
      color: #888;
      border-radius: 4px;
      cursor: pointer;
    }
    .filter-btn.active {
      background: #3e3e5e;
      color: #e0e0e0;
      border-color: #7c3aed;
    }

    .tab-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 6px 8px;
    }
    .tab-list-empty {
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 11px;
    }
    .tab-list-empty .hint { margin-top: 4px; color: #555; }
    .tab-entry {
      display: flex;
      gap: 8px;
      padding: 8px;
      margin-bottom: 4px;
      background: #1e1e36;
      border: 1px solid #2e2e4a;
      border-radius: 6px;
      cursor: pointer;
    }
    .tab-entry:hover { border-color: #7c3aed; }
    .tab-entry.discarded { opacity: 0.75; }
    .tab-entry.discarded .tab-thumb { filter: grayscale(60%) brightness(0.8); }
    .tab-thumb {
      width: 60px; height: 40px;
      object-fit: cover; border-radius: 3px;
      background: #2e2e4a; flex-shrink: 0;
    }
    .tab-thumb-placeholder {
      width: 60px; height: 40px;
      background: #2e2e4a; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .tab-info { flex: 1; min-width: 0; }
    .tab-title {
      font-size: 11px; font-weight: 600; color: #e0e0e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab-domain { font-size: 9px; color: #9ca3af; margin-top: 1px; }
    .tab-summary {
      font-size: 10px; color: #9ca3af; margin-top: 3px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .tab-meta { display: flex; gap: 6px; margin-top: 3px; align-items: center; }
    .tab-badge {
      font-size: 8px; padding: 1px 5px;
      border-radius: 3px; background: #374151; color: #d1d5db;
    }
    .tab-badge.active { background: #065f46; color: #6ee7b7; }
    .tab-badge.hibernated { background: #4c1d95; color: #c4b5fd; }
    .tab-wake-btn {
      padding: 3px 8px; font-size: 9px;
      background: #5b21b6; border: 1px solid #7c3aed;
      color: #fff; border-radius: 4px; cursor: pointer;
      align-self: center; flex-shrink: 0;
    }
    .tab-wake-btn:hover { background: #6d28d9; }

    #status {
      font-size: 11px; color: #888;
      padding: 5px 14px 8px; min-height: 20px;
    }
    #status.ok { color: #6ee7b7; }
    #status.err { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>🔷 Waldo Tabs</h1>
    <span class="provider-badge" id="providerBadge">No AI</span>
  </header>

  <!-- Hub actions -->
  <div class="action-row">
    <button class="btn chat" id="openChat">💬 Open Chat</button>
    <button class="btn" id="openSettings">⚙️ Settings</button>
    <button class="btn primary" id="optimizeAll">Optimize All</button>
  </div>

  <!-- Tab filter + list -->
  <div class="tab-controls">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="discarded">Hibernated</button>
    </div>
  </div>

  <section class="tab-list" id="tabList">
    <div class="tab-list-empty" id="emptyState">
      <p>No tabs cached yet.</p>
      <p class="hint">Click "Optimize All" to hibernate inactive tabs.</p>
    </div>
  </section>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
