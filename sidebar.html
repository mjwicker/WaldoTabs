<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waldo Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .sidebar-header {
      padding: 10px 12px 8px;
      border-bottom: 1px solid #2e2e4a;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidebar-header h1 { font-size: 13px; font-weight: 600; color: #7c3aed; flex: 1; }
    .provider-chip {
      font-size: 10px; padding: 2px 7px;
      background: #2e2e4a; border-radius: 10px; color: #888;
    }
    .provider-chip.connected { background: #064e3b; color: #6ee7b7; }
    .settings-link {
      font-size: 10px; color: #555; text-decoration: none;
      padding: 2px 6px; border-radius: 4px;
    }
    .settings-link:hover { color: #888; background: #1e1e36; }

    /* ── Page context toggle ── */
    .page-ctx-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid #2e2e4a;
      font-size: 11px;
      flex-shrink: 0;
    }
    .page-ctx-bar label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #aaa; }
    .page-ctx-bar input { accent-color: #7c3aed; }
    .page-ctx-label { flex: 1; }
    #pageCtxTitle {
      font-size: 10px; color: #6c6c9c;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      max-width: 160px;
    }

    /* ── Transcript ── */
    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 92%;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 2px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e1e36;
      border: 1px solid #2e2e4a;
      border-bottom-left-radius: 2px;
    }
    .msg.system-note {
      align-self: center;
      background: transparent;
      color: #555;
      font-size: 10px;
      font-style: italic;
      border: none;
      padding: 2px 0;
    }
    .msg.error {
      align-self: flex-start;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
    }
    .thinking {
      align-self: flex-start;
      font-size: 11px; color: #555; font-style: italic;
      padding: 6px 10px;
    }

    /* ── Approval card ── */
    .approval-card {
      align-self: flex-start;
      background: #1a1a2e;
      border: 1px solid #7c3aed;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      max-width: 96%;
    }
    .approval-card .label {
      font-size: 10px; color: #a855f7; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
    }
    .approval-card .action-desc {
      color: #e0e0e0; margin-bottom: 8px;
    }
    .approval-btns { display: flex; gap: 6px; }
    .approval-btns button {
      padding: 4px 12px; border-radius: 5px; font-size: 11px; cursor: pointer;
    }
    .approve-btn { background: #5b21b6; border: 1px solid #7c3aed; color: #fff; }
    .approve-btn:hover { background: #6d28d9; }
    .deny-btn { background: #2e2e4a; border: 1px solid #3e3e5e; color: #aaa; }
    .deny-btn:hover { background: #3e3e5e; }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid #2e2e4a;
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #chatInput {
      flex: 1;
      background: #1e1e36;
      border: 1px solid #3e3e5e;
      color: #e0e0e0;
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 12px;
      resize: none;
      min-height: 36px;
      max-height: 100px;
      font-family: inherit;
    }
    #chatInput:focus { outline: none; border-color: #7c3aed; }
    #sendBtn {
      padding: 7px 12px;
      background: #5b21b6;
      border: 1px solid #7c3aed;
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #sendBtn:hover { background: #6d28d9; }
    #sendBtn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="sidebar-header">
    <h1>🔷 Waldo Chat</h1>
    <span class="provider-chip" id="providerChip">No AI</span>
    <a class="settings-link" id="settingsLink" href="#">⚙️</a>
  </div>

  <div class="page-ctx-bar">
    <label>
      <input type="checkbox" id="usePageCtx">
      <span>📄 Use this page</span>
    </label>
    <span class="page-ctx-label" id="pageCtxTitle"></span>
  </div>

  <div class="transcript" id="transcript"></div>

  <div class="input-area">
    <textarea id="chatInput" rows="1" placeholder="Ask anything…"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
